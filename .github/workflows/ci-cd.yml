name: CI/CD

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  ci:
    name: Lint, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Run Ruff linter
        run: poetry run ruff check .

      - name: Check code formatting
        run: poetry run ruff format --check .

      - name: Run unit tests
        run: poetry run pytest

      - name: Build Python wheel
        run: poetry build

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: microsql-engine-wheel
          path: dist/*.whl

      - name: Build Docker image
        run: docker build -t microsql-engine:${{ github.sha }} .

      - name: Test Docker image
        run: |
          docker run --rm \
            -v "$PWD:/data" \
            microsql-engine:${{ github.sha }} \
            /data/query.sql --data-dir /data --config /data/microsql.config.json

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: ci

    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Build Python wheel
        run: poetry build

      - name: Build Docker image
        run: docker build -t microsql-engine:${{ github.ref_name }} .

      - name: Save Docker image as artifact
        run: docker save microsql-engine:${{ github.ref_name }} -o microsql-engine-docker-image.tar

      - name: Create GitHub Release and upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/*.whl \
            microsql-engine-docker-image.tar \
            --title "MicroSQL Engine ${GITHUB_REF_NAME}" \
            --notes "Автоматично створений реліз для версії ${GITHUB_REF_NAME}."